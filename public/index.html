<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Key Finder | YouTube to Key</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            margin-bottom: 15px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 30px;
            display: none;
        }
        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .key-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .key-value {
            font-size: 64px;
            font-weight: bold;
            margin: 15px 0;
        }
        .section {
            background: #f7fafc;
            border-radius: 15px;
            padding: 20px;
        }
        .section-title {
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .chord-list {
            font-family: monospace;
            font-size: 14px;
            line-height: 1.8;
            word-wrap: break-word;
        }
        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: #fc8181;
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }
        .info {
            background: #edf2f7;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 13px;
        }
        @media (max-width: 600px) {
            .key-value { font-size: 48px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎵 Worship Key Finder 🎵</h1>
            <div class="subtitle">Paste any YouTube link - Get the key instantly!</div>
            
            <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..." />
            <button id="analyzeBtn">🔍 Find Song Key</button>
            
            <div id="result" class="result">
                <div class="key-card">
                    <div class="key-value" id="detectedKey">--</div>
                    <div id="confidence" class="confidence">Confidence: --</div>
                </div>
                <div class="section">
                    <div class="section-title">🎸 Chord Progression</div>
                    <div id="chordsList" class="chord-list">--</div>
                </div>
            </div>
            
            <div id="error" class="error"></div>
            
            <div class="info">
                <strong>🎵 How it works:</strong><br>
                1. Paste ANY YouTube worship song URL<br>
                2. Click "Find Song Key"<br>
                3. Get the key and chords instantly!<br>
                <br>
                <strong>✅ Works with:</strong> YouTube.com, youtu.be, and even playlist links!
            </div>
        </div>
    </div>

    <script>
        async function analyzeSong() {
            const url = document.getElementById('youtubeUrl').value.trim();
            const btn = document.getElementById('analyzeBtn');
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            
            if (!url) {
                showError('Please paste a YouTube URL!');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Analyzing...';
            errorDiv.style.display = 'none';
            resultDiv.classList.remove('show');
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error);
                
                document.getElementById('detectedKey').textContent = data.key;
                document.getElementById('confidence').textContent = `Confidence: ${data.confidence}%`;
                document.getElementById('chordsList').innerHTML = data.chords_with_roman.slice(0, 12).join(' → ');
                resultDiv.classList.add('show');
                
            } catch (error) {
                showError(error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔍 Find Song Key';
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }
        
        document.getElementById('analyzeBtn').addEventListener('click', analyzeSong);
        document.getElementById('youtubeUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyzeSong();
        });
    </script>
</body>
</html>
